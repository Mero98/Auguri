<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Per Te ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            background-color: #e3f2fd; 
            padding: 40px; 
            color: #444; 
            overflow-x: hidden; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            display: inline-block; 
            max-width: 450px; 
            width: 90%; 
            border: 2px solid #bbdefb; 
            position: relative; 
            z-index: 10; 
        }
        h2 { 
            color: #1976d2; 
            margin-bottom: 20px; 
            font-size: 19px; 
            min-height: 90px; 
            line-height: 1.5; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: 600;
        }
        input { 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 2px solid #bbdefb; 
            width: 75%; 
            outline: none; 
            text-align: center; 
            font-size: 16px; 
            font-family: 'Poppins', sans-serif;
        }
        button { 
            background-color: #42a5f5; 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            transition: 0.3s; 
            font-family: 'Poppins', sans-serif;
        }
        button:hover { 
            background-color: #1e88e5; 
            transform: scale(1.05); 
        }
        #feedback { 
            margin-top: 15px; 
            font-weight: 400; 
            color: #1e88e5; 
            min-height: 24px; 
            font-style: italic; 
        }
        #photo-container { 
            display: none; 
            margin-top: 20px; 
            animation: fadeIn 2s; 
        }
        #photo { 
            width: 100%; 
            border-radius: 20px; 
            border: 5px solid #bbdefb; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        .heart { 
            position: fixed; 
            color: #ff4d6d; 
            font-size: 20px; 
            z-index: 1; 
            pointer-events: none; 
            animation: fall linear forwards; 
            top: -20px; 
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2 id="question-text">Ma lo sai che sei proprio una guastafeste a chiedermi di uscire proprio stasera?</h2>
    
    <div id="quiz-section">
        <input type="text" id="answer-input" placeholder="Si o No?">
        <br>
        <button onclick="checkAnswer()">Rispondi</button>
    </div>

    <p id="feedback"></p>

    <div id="photo-container">
        <img id="photo" src="noi.jpg" alt="Noi due">
        <h3 style="color: #1976d2; margin-top: 15px; font-weight: 600;">Tanti auguri vita mia! ❤️💐</h3>
    </div>
</div>

<script>
    let step = 0;
    
    const questions = [
        "Ma lo sai che sei proprio una guastafeste a chiedermi di uscire proprio stasera?",
        "Lo sai che volevo farti una sorpresa a mezzanotte senza dirti nulla, ma mi hai rovinato il piano?",
        "è stata una bellissima serata penso anche più di quanto sarebbe stata la mia piccola sorpresa, e ora o regaliii (speriamo ti piacciano)"
    ];

    function checkAnswer() {
        let inputField = document.getElementById("answer-input");
        let input = inputField.value.toLowerCase().trim();
        let feedback = document.getElementById("feedback");
        let questionText = document.getElementById("question-text");

        let isCorrect = false;
        let nextFeedback = "";
        let errorMsg = "Daiii rispondi giusto e non fare la stupidaaa 😜";

        if (step === 0) {
            if (input === "si") {
                isCorrect = true;
                nextFeedback = "Esatto! Mi hai distrutto un piano perfetto... 😤";
            } else if (input === "no") {
                feedback.innerText = errorMsg;
            }
        } 
        else if (step === 1) {
            if (input === "si") {
                isCorrect = true;
                nextFeedback = "Ebbene sì, ma ti perdono perché sei tu... ❤️";
            } else if (input === "no") {
                isCorrect = true;
                nextFeedback = "Inutile che neghi! Mi hai proprio anticipato! Ma ti perdono... ❤️";
            }
        } 
        else if (step === 2) {
            if (input === "si") {
                isCorrect = true;
                nextFeedback = "";
            } else if (input === "no") {
                feedback.innerText = errorMsg;
            }
        }

        if (isCorrect) {
            feedback.innerText = nextFeedback;
            step++;
            inputField.value = "";
            
            // Timer impostato a 6000ms (6 secondi)
            if (step < questions.length) {
                setTimeout(() => {
                    questionText.innerText = questions[step];
                    feedback.innerText = "";
                }, 6000); 
            } else {
                document.getElementById("quiz-section").style.display = "none";
                document.getElementById("photo-container").style.display = "block";
                feedback.innerText = ""; 
                startHearts(); 
            }
        } else if (input !== "si" && input !== "no" && input !== "") {
            feedback.innerText = "Rispondi 'Si' o 'No'...";
        }
    }

    function startHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 2 + 3 + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }, 300);
    }

    document.getElementById("answer-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") checkAnswer();
    });
</script>

</body>
</html>
